<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
    <title>Aroma Marker AR</title>
    <script src="https://aframe.io/releases/1.5.0/aframe.min.js"></script>
    <script src="https://raw.githack.com/AR-js-org/AR.js/3.4.7/aframe/build/aframe-ar.js"></script>
    <style>
      html,
      body {
        width: 100%;
        height: 100%;
        margin: 0;
        overflow: hidden;
        background: #000;
        font-family: system-ui, sans-serif;
      }

      .marker-hint {
        position: fixed;
        top: max(14px, env(safe-area-inset-top));
        left: 50%;
        z-index: 20;
        width: max-content;
        max-width: calc(100vw - 28px);
        transform: translateX(-50%);
        padding: 8px 14px;
        border-radius: 999px;
        color: #fff;
        background: rgba(0, 0, 0, 0.68);
        font-size: 13px;
        font-weight: 700;
        text-align: center;
      }
    </style>
  </head>
  <body>
    <div class="marker-hint">Point at the Hiro marker</div>
    <a-scene
      embedded
      renderer="alpha: true; antialias: true; colorManagement: true"
      gltf-model="dracoDecoderPath: /draco/gltf/"
      vr-mode-ui="enabled: false"
      arjs="sourceType: webcam; videoTexture: true; debugUIEnabled: false"
    >
      <a-assets>
        <a-asset-item id="dish-model" src="/models/10.glb"></a-asset-item>
      </a-assets>

      <a-marker preset="hiro" smooth="true" smoothCount="5" smoothTolerance="0.01" smoothThreshold="2">
        <a-entity
          gltf-model="#dish-model"
          position="0 0 0"
          rotation="-90 0 0"
          scale="0.35 0.35 0.35"
        ></a-entity>
      </a-marker>

      <a-entity camera></a-entity>
    </a-scene>
  </body>
</html>
