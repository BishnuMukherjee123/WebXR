<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
    <title>Aroma AR</title>

    <!-- 1. A-Frame CDN — must be first, registers custom elements globally -->
    <script src="https://aframe.io/releases/1.6.0/aframe.min.js"></script>
    <!-- 2. Our AR component — registers AFTER A-Frame, BEFORE <a-scene> is parsed -->
    <script src="/ar-placement.js"></script>

    <style>
      * { margin: 0; padding: 0; box-sizing: border-box; }
      html, body { width: 100%; height: 100%; overflow: hidden; background: #000; }
      /* React UI sits above A-Frame canvas */
      #root { position: fixed; inset: 0; z-index: 10; pointer-events: none; }
    </style>
  </head>
  <body>
    <!--
      A-Frame scene lives OUTSIDE React.
      This avoids React's reconciler overwriting A-Frame's DOM,
      which was causing the black screen / broken initialization.

      Script loading order guarantees:
        1. aframe.js    → AFRAME global available
        2. ar-placement.js → component registered
        3. <a-scene ar-placement> → A-Frame finds the component ✓
        4. React module → UI only, no a-scene in JSX
    -->
    <a-scene
      webxr="requiredFeatures: hit-test; optionalFeatures: dom-overlay, light-estimation"
      renderer="antialias: true; alpha: true"
      vr-mode-ui="enabled: false"
      xr-mode-ui="enabled: false"
      ar-placement
    >
      <!-- Reticle ring — shows detected surface position -->
      <a-torus
        id="ar-reticle"
        radius="0.18"
        radius-tubular="0.012"
        segments-tubular="64"
        rotation="-90 0 0"
        material="color: white; shader: flat; opacity: 0.85"
        visible="false"
      ></a-torus>

      <!-- 3D GLB model — hidden until user taps to place -->
      <a-entity
        id="ar-model"
        gltf-model="https://iskchovltfnohyftjckg.supabase.co/storage/v1/object/public/models/10.glb"
        scale="3 3 3"
        visible="false"
      ></a-entity>

      <!-- Lighting -->
      <a-light type="ambient"     color="#ffffff" intensity="0.7"></a-light>
      <a-light type="directional" color="#ffffff" intensity="1.0" position="-1 3 -1"></a-light>
    </a-scene>

    <!-- React root — UI overlay and landing screen ONLY -->
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
