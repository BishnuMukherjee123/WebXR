<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
    <title>Aroma AR</title>

    <!-- A-Frame must load before AR.js and custom components. -->
    <script src="https://aframe.io/releases/1.6.0/aframe.min.js"></script>
    <script src="https://cdn.jsdelivr.net/gh/AR-js-org/AR.js/aframe/build/aframe-ar.js"></script>
    <script src="/ar-placement.js"></script>

    <style>
      * { margin: 0; padding: 0; box-sizing: border-box; }
      html, body { width: 100%; height: 100%; overflow: hidden; background: #000; }
      #root { position: fixed; inset: 0; z-index: 10; pointer-events: none; }
      a-scene { visibility: hidden; }
      body.arjs-running a-scene { visibility: visible; }
    </style>
  </head>
  <body>
    <!-- AR.js marker scene lives outside React so A-Frame can own the custom DOM. -->
    <a-scene
      embedded
      renderer="antialias: true; alpha: true; precision: highp"
      arjs="sourceType: webcam; debugUIEnabled: false; detectionMode: mono_and_matrix; matrixCodeType: 3x3;"
      vr-mode-ui="enabled: false"
      xr-mode-ui="enabled: false"
      ar-placement
    >
      <a-marker
        id="ar-marker"
        preset="hiro"
        smooth="true"
        smooth-count="5"
        smooth-tolerance="0.01"
        smooth-threshold="2"
      >
        <a-entity
          id="ar-model"
          gltf-model="https://iskchovltfnohyftjckg.supabase.co/storage/v1/object/public/models/10.glb"
          position="0 0 0"
          rotation="-90 0 0"
          scale="0.65 0.65 0.65"
          visible="true"
        ></a-entity>
      </a-marker>

      <a-light type="ambient" color="#ffffff" intensity="0.7"></a-light>
      <a-light type="directional" color="#ffffff" intensity="1.0" position="-1 3 -1"></a-light>
      <a-entity camera></a-entity>
    </a-scene>

    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
