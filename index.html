<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
    <title>Aroma AR</title>

    <!--
      A-Frame MUST load via CDN before the React/Vite module bundle.
      It registers custom elements (<a-scene>, <a-entity>, etc.) globally.
      If loaded as an ESM module inside Vite, it breaks due to
      document.write and window.customElements timing issues.
    -->
    <script src="https://aframe.io/releases/1.6.0/aframe.min.js"></script>

    <style>
      * { margin: 0; padding: 0; box-sizing: border-box; }
      html, body { width: 100%; height: 100%; overflow: hidden; background: #000; }
      #root { width: 100%; height: 100%; }

      /* A-Frame canvas must cover the full screen */
      a-scene { width: 100vw !important; height: 100vh !important; }
      .a-canvas { width: 100% !important; height: 100% !important; }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
